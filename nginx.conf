server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Limite de upload — usuário pode anexar capa/material.
    # O backend tem seu próprio limite, mas aqui também precisa permitir.
    client_max_body_size 50m;

    # Compressão básica
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    # Assets gerados pelo Vite (com hash) podem ser cacheados agressivamente.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Outros estáticos comuns
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot|otf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota desconhecida cai no index.html para
    # que o React Router resolva no lado do cliente.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Mensagem de erro custom (opcional)
    error_page 404 /index.html;
}
